# SSM (Surrogate Safety Measures) Configuration

# Vehicle type label mappings
vehicle_labels:
  pedestrian: 1
  bicycle: 2
  motorcycle: 3
  car: 4
  escooter: 5
  van: 6
  truck: 7
  bus: 8

light_vehicles: [1, 2, 3, 5]  # Pedestrian, bicycle, motorcycle, e-scooter
heavy_vehicles: [4, 6, 7, 8]  # Car, van, truck, bus

# Pair extraction filters for vehicle-vehicle conflicts
filters:
  vehicle_labels: [4, 6, 7, 8]
  min_vehicle_speed: 1.5        # m/s, filters stationary/parking vehicles
  max_distance: 8.0            # m, maximum distance between vehicles to consider
  max_lateral_distance: 2.0     # m, maximum perpendicular distance (same lane check)
  max_ttc: 2.0                  # seconds, captures moderate to critical near-misses
  min_closing_speed: 1.0        # m/s, filters slow-closing interactions
  min_speed_diff: 1.0           # m/s, follower must be faster than leader

# M-DRAC (Modified Deceleration Rate to Avoid Crash) parameters
mdrac:
  # Perception-Reaction Time by vehicle type (seconds)
  prt:
    1: 1.0   # Pedestrian
    2: 1.0   # Bicycle
    3: 0.92  # Motorcycle
    4: 0.92  # Car
    5: 1.0   # E-scooter
    6: 1.5   # Van
    7: 2.0   # Truck
    8: 2.0   # Bus
  
  # Minimum M-DRAC threshold to classify as near-miss (m/s²)
  min_mdrac: 3.4
  
  # Severity classification thresholds (m/s²)
  severity:
    severe: 7.0      # Emergency braking
    moderate: 5.0    # Hard braking
    normal: 3.4      # Noticeable braking (below this = not a near-miss)

# SPF (Safety Potential Field) parameters
spf:
  # Objective Field (O-field) - Physical collision probability
  objective:
    beta_p: 10        # Spatial shape factor (binary-like collision boundary)
    beta_t: 2         # Temporal shape factor (quadratic time pressure)
    t_star: 7.5       # Time horizon in seconds (look-ahead limit)
  
  # Subjective Field (S-field) - Driver discomfort
  subjective:
    gamma_y: 1.4310   # Lateral scale (constant) [meters]
    beta_y: 4.9956    # Lateral shape (constant) [dimensionless]
  
  # Risk thresholds for both fields
  thresholds:
    warning: 0.5     # e^-1 threshold (high risk starts)
    danger: 0.70      # High danger level
    critical: 0.90    # Critical level
  
  # Minimum risk threshold to classify as near-miss
  min_risk: 0.50
  
  # Composite risk combination method ('max', 'probabilistic', 'weighted')
  composite_method: 'probabilistic'

# Processing parameters
processing:
  chunk_size: 500000
  dtype_optimization: true
  verbose: true

# Process multiple timestamps per batch for vectorized pair generation
timestamp_batch_size: 20000