# DATA LOADING
data:
  # Optimized dtypes for memory efficiency
  dtypes:
    id: int32
    label: int8
    pos_x: float32
    pos_y: float32
    pos_z: float32
    size_x: float32
    size_y: float32
    size_z: float32
    vel: float32
    vel_x: float32
    vel_y: float32
    vel_z: float32
    yaw: float32
    yaw_rate: float32
  
  chunk_size: 500000  # Rows per chunk for large datasets


# PREPROCESSING FILTERS
preprocessing:
  # Lifetime Filter - removes short-lived detections (noise/false positives)
  lifetime_filter:
    enabled: true
    min_lifespan:  # Minimum frames per vehicle type
      1: 30   # pedestrian
      2: 80   # bicycle
      3: 60   # motorcycle
      4: 90   # car
      5: 30   # escooter
      6: 100  # van
      7: 100  # truck
      8: 180  # bus
  
  # Footpath Zone Filter - removes vehicles in pedestrian-only areas
  footpath_filter:
    enabled: true
    max_speed:  # Maximum speed (m/s) per vehicle type in footpath zones
      1: 4.0   # pedestrian
      2: 6.0   # bicycle
      3: 12.0  # motorcycle
      4: 12.0  # car
      5: 4.0   # escooter
      6: 12.0  # van
    forbidden_labels: [3, 4, 5, 6, 7, 8]  # vehicle types not allowed in footpaths
  
  # Crosswalk Filter - removes vehicles moving parallel to crosswalks
  crosswalk_filter:
    enabled: true
    max_parallel_angle: 45.0  # degrees - vehicles within this angle are considered parallel
  
  # Static Object Filter - removes stationary vehicles (parked cars)
  static_filter:
    enabled: true
    min_speed: 0.5       # m/s - minimum sustained speed
    window_size: 10      # frames - window for checking sustained low speed
  
  # Ghost Filter - removes spawn/despawn artifacts
  ghost_filter:
    enabled: true
    spawn_threshold: 5.0  # m/s - max allowed initial velocity
    despawn_threshold: 5.0  # m/s - max allowed final velocity
  
  # Overlap Filter - removes physically impossible overlapping pairs
  overlap_filter:
    enabled: true
    buffer: 0.5  # meters - safety buffer for overlap check


# SSM PAIR GENERATION FILTERS
filters:
  # Vehicle type filter - which vehicle types to analyze
  vehicle_labels: [4, 6, 7, 8]  # car, van, truck, bus
  
  # Basic motion filters
  min_vehicle_speed: 0.5     # m/s - filters stationary/parking vehicles
  max_distance: 8.0          # m - maximum distance between vehicles to consider
  max_lateral_distance: 1.8  # m - maximum perpendicular distance
  
  # Conflict detection filters
  max_ttc: 1.8               # seconds - Time-To-Collision threshold
  min_closing_speed: 0.75     # m/s - minimum rate of gap closure
  min_speed_diff: 0.5        # m/s - follower must be faster than leader


# M-DRAC (Modified Deceleration Rate to Avoid Crash)
mdrac:
  # Perception-Reaction Time by vehicle type (seconds)
  prt:
    1: 1.0   # pedestrian
    2: 1.0   # bicycle
    3: 0.92  # motorcycle
    4: 0.92  # car
    5: 1.0   # escooter
    6: 1.5   # van
    7: 2.0   # truck
    8: 2.0   # bus
  
  # Detection thresholds
  min_mdrac: 3.4  # m/s² - minimum M-DRAC value to classify as near-miss
  
  # Severity classification thresholds
  severity:
    moderate: 5.0  # m/s² - moderate severity threshold
    severe: 7.0    # m/s² - severe severity threshold
  
  # Adaptive M-DRAC parameters
  closing_accel_threshold: -0.5  # m/s² - threshold for active response detection
  min_time_buffer: 0.2           # seconds - minimum time buffer to avoid infinity
  
  # Temporal averaging parameters
  avg_window: 1.0          # seconds - rolling average window
  min_avg_frames: 3        # minimum frames required for sustained event
  
  # Zone-specific overrides
  zone_overrides:
    crosswalks:
      avg_window: 0.2         # reduced from 1.0s for faster ped-vehicle interactions
      min_avg_frames: 1       # reduced from 3 frames
    lanes:
      # Use default values 
      avg_window: 1.0
      min_avg_frames: 3
    crossing:
      avg_window: 0.2
      min_avg_frames: 2
  
  # Dual-metric detection (for non-longitudinal conflicts)
  yaw_diff_rate_threshold: 15.0      # deg/s - yaw rate threshold
  longitudinal_yaw_threshold: 30.0   # degrees - threshold to classify as longitudinal


# SPF (Safety Potential Field)
spf:
  enabled: false
  status: "experimental-disabled"
  note: "SPF code is retained for research, but is not part of the active runnable pipeline."

  # Field parameters
  beta_p: 0.5  # Physical field weight
  beta_t: 0.3  # Temporal field weight
  t_star: 3.0  # seconds - characteristic time scale
  
  # Detection threshold
  min_spf: 0.7  # minimum SPF value to classify as conflict
  
  # Severity classification
  severity:
    moderate: 0.2  # moderate severity threshold
    severe: 0.4    # severe severity threshold


# POSTPROCESSING FILTERS
postprocessing:
  # Teleportation Filter - removes unrealistic position jumps
  teleportation_filter:
    enabled: true
    max_speed_threshold: 50.0  # m/s - maximum realistic speed
    
  # Duration Filter - aggregates sustained conflicts
  duration_filter:
    enabled: true
    min_sustained_frames: 3  # minimum frames for valid conflict


# PROCESSING OPTIONS
processing:
  verbose: true        # print detailed logs
  batch_size: 20000    # batch size for pair generation
  num_threads: -1      # -1 = use all available cores
  
  # Zone assignment
  zone_batch_size: 100000  # batch size for spatial joins

# VISUALIZATION
visualization:
  plot_conflicts: false       # generate trajectory plots for conflicts
  max_plots: 100             # maximum number of plots to generate
  plot_format: 'png'         # output format (png, pdf, svg)
  dpi: 150                   # plot resolution


# VLM VALIDATION
vlm:
  # Primary backend
  primary_backend: "gemini"  # "gemini" or "local"
  
  # Gemini API settings (free tier: 1500 requests/day)
  gemini:
    model: "gemini-2.5-flash"  # Updated: gemini-1.5-flash deprecated
    api_key_env: "GEMINI_API_KEY"  # Read from environment variable
    max_retries: 3
    timeout: 30  # seconds
    rate_limit_delay: 1  # seconds between requests
  
  
  # Paths configuration (auto-constructed from day parameter)
  paths:
    base_results: "results/brussels/mdrac"
    base_data: "/home/ubuntu/data/uploads/objects/clean"
  
  # Local model fallback
  local:
    model_id: "Qwen/Qwen2.5-VL-3B-Instruct"  # Default to 3B (faster on CPU)
    # Options: "Qwen/Qwen2.5-VL-3B-Instruct" (7.1GB) or "Qwen/Qwen2.5-VL-7B-Instruct" (16GB)
    device: "auto"  # "auto", "cpu", or "cuda"
    torch_dtype: "float32"  # "float32" for CPU, "bfloat16" for GPU
  
  # Validation settings
  confidence_threshold: 70  # Minimum confidence for "REAL_NEARMISS"
  top_n_validate: 50        # Number of top events to validate
  save_plots: true          # Save trajectory plots
  plot_dpi: 150


# OUTPUT
output:
  save_format: 'csv'         # csv or xlsx
  include_metadata: true     # include detection metadata
  generate_replay_links: true  # generate replay URLs
  
  # Replay link template (region-specific)
  replay_base_url: "https://di-india-collab.flow-analytics.io/tools/replay/"
