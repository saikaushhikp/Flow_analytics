# IRSM (Intelligent Risk Scoring Mechanism) Configuration
# Unified config for near-miss classification across regions

# ============================================================================
# DATA CONFIGURATION - Region-specific paths
# ============================================================================
data:
  regions:
    brussels:
      # Input: Raw trajectory data directory (date-partitioned)
      data_dir: "/data/uploads/brussels"
      # Output: Generated risk vectors
      output_dir: "/home/ubuntu/prem/irsm/data/brussels"
      
    oulu:
      # Input: Raw trajectory data directory
      data_dir: "/data/uploads/oulu_data"
      # Output: Generated risk vectors
      output_dir: "/home/ubuntu/prem/irsm/data/oulu"

# ============================================================================
# FEATURE EXTRACTION CONFIGURATION
# ============================================================================
features:
  # Temporal features (time-based risk indicators)
  temporal:
    - ttc_min          # Minimum Time-to-Collision (lower = riskier)
    - ttc_mean         # Average TTC across interaction
    - ttc_std          # TTC variability (higher = more unstable)
    - ttc_critical     # Time spent below critical TTC threshold
    
  # Kinematic features (motion-based indicators)
  kinematic:
    - closing_speed_max      # Peak approach speed
    - closing_speed_mean     # Average closing speed
    - speed_diff_max         # Maximum speed difference
    - speed_diff_mean        # Average speed difference
    - accel_variance         # Acceleration instability
    
  # Spatial features (distance-based indicators)
  spatial:
    - min_distance           # Closest approach distance
    - distance_mean          # Average separation
    - distance_std           # Distance variability
    - lateral_offset         # Cross-track distance (if available)
    
  # Severity features (conflict intensity)
  severity:
    - mdrac_max              # Peak M-DRAC value
    - mdrac_mean             # Average M-DRAC
    - yaw_diff_max           # Maximum heading difference
    - yaw_diff_mean          # Average heading difference

  # Feature normalization
  normalization:
    method: "standard"  # Options: "standard", "minmax", "robust"
    
# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
models:
  # Isolation Forest (unsupervised anomaly detection)
  isolation_forest:
    contamination: 0.001     # Expected 0.1% of pairs are near-misses (very rare!)
    n_estimators: 100        # Number of trees in forest
    max_samples: "auto"      # Samples per tree
    random_state: 42         # Reproducibility
    n_jobs: -1              # Use all CPU cores
    
  # Future models can be added here
  # one_class_svm:
  #   nu: 0.05
  #   kernel: "rbf"

# ============================================================================
# CLASSIFICATION THRESHOLDS
# ============================================================================
thresholds:
  risk_score:
    high: -0.50       # Anomaly score threshold for high-risk (< -0.50)
    medium: -0.30     # Medium-risk threshold (< -0.30)
    low: -0.10        # Low-risk threshold (< -0.10)
    
  visualization:
    top_n: 50         # Generate plots for top N events
    
  validation:
    vlm_threshold: 0.90  # Send high-risk events to VLM validation

# ============================================================================
# PROCESSING CONFIGURATION
# ============================================================================
processing:
  batch_size: 10000         # Pairs processed per batch
  parallel: true            # Enable parallel processing
  n_workers: -1             # CPU cores (-1 = all available)
  
  # Memory management
  chunk_size: 50000         # Rows per chunk for large CSVs
  gc_frequency: 5           # Run garbage collection every N batches

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output:
  results_dir: "/home/ubuntu/prem/results"
  
  # Report format
  reports:
    format: "csv"           # Options: "csv", "json", "parquet"
    include_features: false # Include full feature vectors in output
    
  # Logging
  logging:
    level: "INFO"           # DEBUG, INFO, WARNING, ERROR
    file: "irsm.log"
