# IRSM Configuration
# All settings for Interaction Risk Space Modelling

# Region and Date
region: 'brussels'
date: '2025-06-01'

# Data Paths
data:
  input_dir: 'data'
  # Set FLOW_ANALYTICS_DATA_BRUSSELS or pass --input-dir to override input_dir.
  output_base: 'irsm'

# Preprocessing Filters
preprocessing:
  lifetime: true    # Filter short-lived IDs
  footpath: true    # Remove pedestrian area vehicles
  crosswalk: true   # Remove parallel-moving vehicles at crosswalks
  static: true      # Remove parked vehicles

# Zones
zones:
  focus: 'lanes'    # Focus on lane zones only (not intersections, etc.)

# IRSM-Specific Pair Generation Settings
pair_generation:
  max_distance: 10.0                # meters - spatial proximity threshold
  max_lateral: 2.0                  # meters - same lane threshold
  max_ttc: 13.0                     # seconds - TTC threshold (wider than MDRAC's 10s)
  min_closing_speed: 0.1            # m/s - minimum approach speed
  include_non_approaching: false    # Only approaching pairs (interacting)
  min_avg_mdrac_threshold: 1.0      # m/s² - minimum avg MDRAC to keep (MDRAC uses 3.4)

# Vehicle-Specific PRT (Perception Reaction Time) Values
prt:
  default: 1.5      # Default for unknown types
  car: 1.5
  truck: 2.0
  bus: 1.8
  motorcycle: 1.3
  bicycle: 1.0

# Aggregation Method
aggregation:
  method: 'average'  # 'average' or 'critical_moment'
  window_sec: 1.0    # Only used if method is 'critical_moment'
  min_avg_frames: 3
  max_frame_gap_sec: 0.5

# Model Configuration
model:
  contamination: 0.001  # 0.1% of pairs flagged as anomalies
  n_estimators: 150
  random_state: 2026
  feature_cols:
    - mdrac
    - distance
    - closing_speed
    - closing_accel
    - speed_diff
    - ttc
    - yaw_diff
    - yaw_rate
    - min_safe_dist
    - ttc_min_dist
    - ttc_severity_score
    - traj_min_dist
    - traj_time_horizon
    - traj_severity_score
    - env_min_dist
    - env_max_overlap_prob
    - env_time_horizon
    - env_severity_score
    - decel_initial_speed
    - decel_final_speed
    - decel_speed_change
    - decel_avg_deceleration
    - decel_max_deceleration
    - decel_observation_time
    - decel_num_frames_observed
    - decel_alignment
    - decel_model
  
# Output
output:
  save_per_zone: false   # Single lanes.csv file (not per-zone)

# Evaluator and prediction settings
evaluation:
  start_date: '2025-06-01'
  end_date: '2025-06-07'
  gold_path: 'brussels_june_in.csv'
  canonical_dir: 'irsm/results/brussels'

# Optimized M-DRAC thresholds & parameters
thresholds:
  lanes:
    min_mdrac: 3.4
    max_ttc: 1.0
    min_speed_diff: 0.5
    max_lateral_distance: 1.2
    closing_accel_threshold: -0.3
    min_avg_frames: 3
    min_duration: 0.2
  crosswalks:
    min_mdrac: 3.4
    max_ttc: 0.8
    min_speed_diff: 0.5
    yaw_diff_rate_threshold: 10.0
    avg_window: 0.3
    min_avg_frames: 1
    min_duration: 0.1

# Feature families for training unsupervised and supervised models
feature_sets:
  safety_core:
    - mdrac
    - ttc
    - closing_speed
    - closing_accel
    - speed_diff
    - yaw_diff
    - yaw_rate
    - ttc_severity_score
    - traj_severity_score
    - env_severity_score
    - decel_avg_deceleration
    - decel_max_deceleration

# Unsupervised Ensemble Settings
ensemble:
  weights:
    iforest: 0.4
    gaussian: 0.4
    kinetic_bonus: 0.2

# Calibration Settings for supervised classifiers
calibration:
  method: 'sigmoid'
